<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TudoTorta</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->

  <!-- Ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body class="body">

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container">

    <a class="logo-marca navbar-brand mx-auto" href="#">
      Tudo<i class="fa-solid fa-chart-pie mx-1"></i>Torta
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNavbar">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menuNavbar">
      <ul class="navbar-nav ms-auto text-lg-start">
        <li class="nav-item">
          <a class="nav-link px-3" href="#produtos">Produtos</a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3" href="#sobre">Sobre</a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3" href="#contato">Contato</a>
        </li>
      </ul>
    </div>

  </div>
</nav>

<!-- ================= HERO ================= -->
<section class="hero-glass d-flex align-items-center justify-content-center text-center py-5">
  <div class="glass-box">
    <h1 class="display-4 fw-bold">
      Salgados e Tortas Artesanais
    </h1>

    <p class="lead">
      Peça agora com rapidez e sabor incomparável
    </p>

    <a href="https://wa.me/5599999999999" class="btn btn-success btn-lg mt-3">
      Fazer Pedido
    </a>
  </div>
</section>

<!-- ================= PRODUTOS ================= -->
<section id="produtos" class="bg-orange py-5">
  <div class="container">

    <h2 class="text-center text-white mb-5">Nossos Produtos</h2>

    <!-- IMPORTANTE: ID CORRETO -->
    <div class="row g-4" id="lista-produtos"></div>

  </div>
</section>

<!-- ================= MODAL ================= -->
<div class="modal fade" id="modalProduto" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title"></h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body text-center">
        <img class="modal-img img-fluid mb-3" alt="">
        <p class="modal-preco fw-bold text-success"></p>
        <p class="modal-desc"></p>
      </div>

    </div>
  </div>
</div>

<!-- ================= SCRIPTS ================= -->

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="javascript.js"></script>
